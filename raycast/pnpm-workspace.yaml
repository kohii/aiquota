# pnpm 11 reads settings from here (no longer from the package.json "pnpm" field).
# Pin a single @types/react so it matches the copy bundled by @raycast/api
# (avoids two ReactNode identities that break the type-check).
overrides:
  "@types/react": "19.0.10"

# Allow esbuild to run its postinstall (it installs a platform binary used by
# `ray build` and vitest). pnpm blocks build scripts by default.
allowBuilds:
  esbuild: true
